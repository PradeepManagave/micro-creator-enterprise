name: Production Build & Test CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Prisma Generate
      run: npx prisma generate --schema=apps/api/prisma/schema.prisma

    - name: Build Turbo
      run: npx turbo build

    # Optional: Build Docker Image to verify it compiles cleanly
    - name: Test Docker Build
      run: docker build -t micro-creator-enterprise .
